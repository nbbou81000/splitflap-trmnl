name: Mise a jour Split-Flap (meteo + ISS)

on:
  schedule:
    - cron: "*/30 * * * *"   # toutes les 30 minutes
  workflow_dispatch:          # lancement manuel possible

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Recuperer meteo + ISS
        env:
          LAT: ${{ vars.LAT }}
          LON: ${{ vars.LON }}
          CITY: ${{ vars.CITY }}
          N2YO_KEY: ${{ secrets.N2YO_KEY }}
        run: node fetch.js

      - name: Commit data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "maj data.json [skip ci]"
          git push
